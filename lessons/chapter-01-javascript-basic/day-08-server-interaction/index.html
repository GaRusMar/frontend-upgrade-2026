<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Day 08 — Server Interaction</title><link rel="stylesheet" href="./style.css"></head><body><main class="page"><section class="lesson"><h1 class="lesson__title">Day 08: Bangkok Express Products Loader and Order Form</h1><p class="lesson__description">Формы, валидация, fetch, Promise, JSON, loading/error/success states.</p><section class="block"><h2 class="block__title">Products loader</h2><button class="button" type="button" data-action="load-products">Load products</button><p class="status" data-load="loading" hidden>Loading products...</p><p class="error" data-load="error"></p><div class="products-list" data-load="products"></div></section><section class="block"><h2 class="block__title">Order form</h2><form class="order-form" data-form="order" novalidate><label class="field"><span>Name</span><input class="input" type="text" name="name" placeholder="Santa Claus"><small class="error" data-error="name"></small></label><label class="field"><span>Phone</span><input class="input" type="tel" name="phone" placeholder="+123456789"><small class="error" data-error="phone"></small></label><label class="field"><span>Email</span><input class="input" type="email" name="email" placeholder="user@example.com"><small class="error" data-error="email"></small></label><label class="field"><span>Address</span><input class="input" type="text" name="address" placeholder="Bangkok street, 1"><small class="error" data-error="address"></small></label><label class="field"><span>Comment</span><textarea class="textarea" name="comment" rows="4" placeholder="No onion, please"></textarea></label><button class="button" type="submit" data-submit="button">Send order</button></form><p class="error" data-submit="error"></p><p class="success" data-submit="success"></p></section></section></main><script src="./script.js"></script></body></html>
